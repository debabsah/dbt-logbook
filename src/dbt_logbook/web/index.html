<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dbt-logbook</title>
<style>
  :root {
    --surface-1: #fcfcfb; --page: #f9f9f7;
    --ink-1: #0b0b0b; --ink-2: #52514e; --ink-muted: #898781;
    --grid: #e1e0d9; --baseline: #c3c2b7; --ring: rgba(11,11,11,0.10);
    --series-1: #2a78d6;
    --cat-model: #2a78d6; --cat-seed: #1baf7a; --cat-snapshot: #eda100;
    --cat-source: #008300; --cat-test: #4a3aa7;
    --status-good: #0ca30c; --status-critical: #d03b3b;
    --good-text: #006300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19; --page: #0d0d0d;
      --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-muted: #898781;
      --grid: #2c2c2a; --baseline: #383835; --ring: rgba(255,255,255,0.10);
      --series-1: #3987e5;
      --cat-model: #3987e5; --cat-seed: #199e70; --cat-snapshot: #c98500;
      --cat-source: #008300; --cat-test: #9085e9;
      --good-text: #0ca30c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page); color: var(--ink-1);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  header {
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    padding: 14px 20px; border-bottom: 1px solid var(--grid);
    background: var(--surface-1);
  }
  header h1 { font-size: 16px; margin: 0; }
  header nav a {
    color: var(--ink-2); text-decoration: none; margin-right: 12px;
    padding-bottom: 2px;
  }
  header nav a.active { color: var(--ink-1); border-bottom: 2px solid var(--series-1); }
  header .meta { margin-left: auto; color: var(--ink-muted); font-size: 12px; }
  main { max-width: 1080px; margin: 0 auto; padding: 20px; }
  .card {
    background: var(--surface-1); border: 1px solid var(--ring);
    border-radius: 8px; padding: 16px 18px; margin-bottom: 16px;
    overflow-x: auto;
  }
  .card h2 { font-size: 14px; margin: 0 0 10px; }
  table { border-collapse: collapse; width: 100%; }
  th { text-align: left; color: var(--ink-muted); font-weight: 500; font-size: 12px; }
  th, td { padding: 6px 10px; border-bottom: 1px solid var(--grid); }
  td.num { font-variant-numeric: tabular-nums; text-align: right; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: color-mix(in srgb, var(--series-1) 6%, transparent); }
  .status { display: inline-flex; align-items: center; gap: 6px; }
  .status .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .status.good .dot { background: var(--status-good); }
  .status.error .dot { background: var(--status-critical); }
  .status.good { color: var(--good-text); }
  .status.error { color: var(--status-critical); }
  .empty { color: var(--ink-2); padding: 24px 8px; }
  .empty code { background: color-mix(in srgb, var(--ink-1) 6%, transparent); padding: 1px 5px; border-radius: 4px; }
  a { color: var(--series-1); }
  .banner {
    background: color-mix(in srgb, var(--status-critical) 10%, var(--surface-1));
    border: 1px solid var(--status-critical); border-radius: 6px;
    padding: 8px 12px; margin-bottom: 12px; font-size: 13px;
  }
  .strip { display: flex; gap: 2px; flex-wrap: wrap; }
  .strip a {
    width: 18px; height: 18px; border-radius: 3px; display: inline-flex;
    align-items: center; justify-content: center; font-size: 11px;
    color: #fff; text-decoration: none;
  }
  .strip a.good { background: var(--status-good); }
  .strip a.error { background: var(--status-critical); }
  svg text { fill: var(--ink-muted); font-size: 11px; }
  .tooltip {
    position: fixed; pointer-events: none; z-index: 10;
    background: var(--surface-1); border: 1px solid var(--ring);
    border-radius: 6px; padding: 6px 10px; font-size: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.15); display: none;
  }
  .diff-col { display: inline-block; vertical-align: top; min-width: 220px; margin-right: 24px; }
  .diff-col h3 { font-size: 13px; margin: 8px 0 4px; }
  .diff-col ul { margin: 0; padding-left: 18px; color: var(--ink-2); }
  select, input {
    background: var(--surface-1); color: var(--ink-1);
    border: 1px solid var(--baseline); border-radius: 6px; padding: 4px 8px;
  }
  #dag { height: 560px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; font-size: 12px; color: var(--ink-2); }
  .legend .swatch { width: 10px; height: 10px; display: inline-block; border-radius: 2px; margin-right: 5px; vertical-align: -1px; }
  pre.sql {
    background: color-mix(in srgb, var(--ink-1) 4%, transparent);
    padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px;
  }
</style>
</head>
<body>
<header>
  <h1>dbt-logbook</h1>
  <nav>
    <a href="#/runs" data-nav="runs">Runs</a>
    <a href="#/diff" data-nav="diff">Diff</a>
    <a href="#/dag" data-nav="dag">DAG</a>
  </nav>
  <span class="meta" id="summary"></span>
</header>
<main id="view"></main>
<div class="tooltip" id="tooltip"></div>
<script src="/static/cytoscape.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
